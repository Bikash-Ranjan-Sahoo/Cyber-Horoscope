    free_tier: "1M requests/month + 400,000 GB-seconds"
    expected_usage: "< 10,000 requests during hackathon"
    cost: "$0.00"
  api_gateway:
    free_tier: "1M HTTP API calls/month for 12 months"
    cost: "$0.00"
  s3:
    free_tier: "5GB storage, 20,000 GET, 2,000 PUT"
    cost: "$0.00"
  cloudfront:
    free_tier: "1TB data transfer, 10M requests/month for 12 months"
    cost: "$0.00"
  total: "$0.00 — entirely within AWS Free Tier for hackathon scale"
