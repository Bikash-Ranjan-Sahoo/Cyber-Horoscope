# ─────────────────────────────────────────────
# FILE: src/validator.py
# ACTION: Add DEV_VALID_ANSWERS + update function signature
# ─────────────────────────────────────────────
validator_py:
  change: ADD_CONSTANT_AND_UPDATE_SIGNATURE
  existing_constant: VALID_ANSWERS   # do not touch
  add_after_existing_constant: |
    # Developer mode valid answers — added v2.0.0
    DEV_VALID_ANSWERS = {
        "q1": ["always", "sometimes", "never"],
        "q2": ["never", "sometimes", "always"],
        "q3": ["always", "sometimes", "never"],
        "q4": ["none", "sometimes", "always"],
        "q5": ["always", "sometimes", "never"],
    }

  update_function_signature:
    old: "def validate_answers(answers: dict) -> str | None:"
    new: "def validate_answers(answers: dict, mode: str = 'user') -> str | None:"
    body_change: |
      Add at the top of the function body, before existing logic:
        valid_map = DEV_VALID_ANSWERS if mode == "dev" else VALID_ANSWERS
      Then replace all references to VALID_ANSWERS inside the function with valid_map.
      The rest of the validation logic is identical.

# ─────────────────────────────────────────────
# FILE: src/horoscope_engine.py
# ACTION: Add DEV_RISK_SCORES, DEV_CYBER_SIGNS, and generate_dev()
# ─────────────────────────────────────────────
horoscope_engine_py:
  change: APPEND_TO_END
  do_not_touch: [RISK_SCORES, RAW_MAX, CYBER_SIGNS, generate, _map_to_label]
  append: |
    # ── Developer Mode Engine ───────────────────────────────────────────────────
    # Added in v2.0.0. Everything above this line is unchanged.

    DEV_RISK_SCORES = {
        "q1": {"always": 30, "sometimes": 15, "never": 0},
        "q2": {"never": 25, "sometimes": 12, "always": 0},
        "q3": {"always": 25, "sometimes": 12, "never": 0},
        "q4": {"none": 20, "sometimes": 10, "always": 0},
        "q5": {"always": 20, "sometimes": 10, "never": 0},
    }

    DEV_RAW_MAX = 120  # 30+25+25+20+20

    DEV_CYBER_SIGNS = [
        {"threshold": 20,  "sign": "Zero Trust Architect",     "emoji": "🏰", "description": "Your codebase is a fortress. Security engineers weep with joy."},
        {"threshold": 40,  "sign": "Dependency Guardian",      "emoji": "🛡️", "description": "You patch things before they become CVEs. Rare energy."},
        {"threshold": 60,  "sign": "The Merge Conflict",       "emoji": "⚠️", "description": "Your intentions are good. Your .env file tells a different story."},
        {"threshold": 80,  "sign": "Prod Cowboy",              "emoji": "🤠", "description": "You deploy on Fridays. You test on prod. You live dangerously."},
        {"threshold": 100, "sign": "Supply Chain Catastrophe", "emoji": "💀", "description": "Your npm install is a threat actor's favourite moment of the day."},
    ]


    def generate_dev(answers: dict) -> dict:
        """Generate a developer-mode cyber horoscope. Added v2.0.0."""
        raw_score = sum(DEV_RISK_SCORES[q][answers[q]] for q in DEV_RISK_SCORES)
        final_score = round((raw_score / DEV_RAW_MAX) * 100)

        sign_data = DEV_CYBER_SIGNS[-1]
        for entry in DEV_CYBER_SIGNS:
            if final_score <= entry["threshold"]:
                sign_data = entry
                break

        # Dimension scores
        secret_raw = DEV_RISK_SCORES["q1"][answers["q1"]]
        secret_label = _map_to_label(secret_raw, {0: "Immaculate", 15: "Questionable", 30: "GitHub Search Nightmare"})

        dep_raw = DEV_RISK_SCORES["q2"][answers["q2"]]
        dep_label = _map_to_label(dep_raw, {0: "Fort Knox", 12: "Probably Fine", 25: "CVE Buffet"})

        env_raw = DEV_RISK_SCORES["q3"][answers["q3"]]
        env_label = _map_to_label(env_raw, {0: "Textbook", 12: "Casual Chaos", 25: "Prod is Dev"})

        integrity_raw = DEV_RISK_SCORES["q4"][answers["q4"]]
        integrity_label = _map_to_label(integrity_raw, {0: "Signed & Sealed", 10: "Loosely Gated", 20: "Yolo Push"})

        error_raw = DEV_RISK_SCORES["q5"][answers["q5"]]
        error_label = _map_to_label(error_raw, {0: "Silent & Secure", 10: "Occasionally Chatty", 20: "Stack Trace as a Feature"})

        # Prophecy selection
        secret_level = "high" if secret_raw >= 20 else ("medium" if secret_raw >= 10 else "low")
        dep_level    = "high" if dep_raw    >= 20 else ("medium" if dep_raw    >= 10 else "low")
        env_level    = "high" if env_raw    >= 20 else ("medium" if env_raw    >= 10 else "low")
        int_level    = "high" if integrity_raw >= 15 else ("medium" if integrity_raw >= 8 else "low")
        err_level    = "high" if error_raw  >= 15 else ("medium" if error_raw  >= 8  else "low")

        roast = random.choice(content.DEV_CONTENT["dev_roast_messages"]) if final_score >= 70 else None

        return {
            "mode": "dev",
            "final_score": final_score,
            "cyber_sign": sign_data["sign"],
            "cyber_sign_emoji": sign_data["emoji"],
            "cyber_sign_description": sign_data["description"],
            "dimensions": {
                "secret_hygiene":        secret_label,
                "dependency_health":     dep_label,
                "environment_discipline": env_label,
                "code_integrity":        integrity_label,
                "error_exposure":        error_label,
            },
            "prophecies": {
                "secrets":      random.choice(content.DEV_CONTENT["secret_prophecies"][secret_level]),
                "dependencies": random.choice(content.DEV_CONTENT["dependency_prophecies"][dep_level]),
                "environment":  random.choice(content.DEV_CONTENT["environment_prophecies"][env_level]),
                "code":         random.choice(content.DEV_CONTENT["code_integrity_prophecies"][int_level]),
                "errors":       random.choice(content.DEV_CONTENT["error_exposure_prophecies"][err_level]),
                "daily":        random.choice(content.DEV_CONTENT["daily_dev_prophecies"]),
            },
            "lucky_security_charm":  random.choice(content.DEV_CONTENT["lucky_dev_charms"]),
            "lucky_security_number": random.choice(content.DEV_CONTENT["lucky_dev_numbers"]),
            "roast_message": roast,
            "generated_at":  datetime.datetime.utcnow().isoformat() + "Z",
        }

# ─────────────────────────────────────────────
# FILE: src/handler.py
# ACTION: Add mode routing (3 lines added, nothing removed)
# ─────────────────────────────────────────────
handler_py:
  change: ADD_MODE_ROUTING
  location: after body parsing and validation, before calling engine.generate()
  instruction: |
    Current code (do not remove):
      result = engine.generate(body["answers"])

    Replace that single line with:
      mode = body.get("mode", "user")   # "user" default = fully backward compatible
      validation_error = validator.validate_answers(body.get("answers", {}), mode)
      if validation_error:
          return _response(400, {"error": "INVALID_ANSWERS", "message": validation_error, "status": 400})
      
      if mode == "dev":
          result = engine.generate_dev(body["answers"])
      else:
          result = engine.generate(body["answers"])

    NOTE: Also update the existing validate_answers call above to pass mode,
    or consolidate into the single call shown above. Either approach is fine
    as long as validate_answers is only called once with the correct mode.
