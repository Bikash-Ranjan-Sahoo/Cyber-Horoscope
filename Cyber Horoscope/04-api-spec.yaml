openapi: "3.0.3"

info:
  title: CyberHoroscope API
  description: |
    Submit your cybersecurity quiz answers and receive a personalised,
    humorous horoscope revealing your Digital Cyber Fate™.
    No auth required. No data stored. Pure serverless comedy.
  version: "1.0.0"
  contact:
    name: CyberHoroscope Hackathon Team

servers:
  - url: https://{apiId}.execute-api.ap-south-1.amazonaws.com
    description: AWS HTTP API — Mumbai (ap-south-1)
    variables:
      apiId:
        description: Auto-generated by API Gateway
        default: "your-api-id"

paths:

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns 200 if the Lambda is warm and the universe is in order.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /horoscope:
    post:
      operationId: generateHoroscope
      summary: Generate a personalised Cyber Horoscope
      description: |
        Submit answers to the 5-question cybersecurity quiz.
        Returns a scored, humorous horoscope with educational security tips.
        Processing happens entirely in Lambda — no data is persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HoroscopeRequest"
            examples:
              terrible_habits:
                summary: User with very poor security hygiene
                value:
                  answers:
                    q1: always
                    q2: none
                    q3: never
                    q4: regularly
                    q5: always
              decent_user:
                summary: Average security-aware user
                value:
                  answers:
                    q1: sometimes
                    q2: some
                    q3: sometimes
                    q4: once_or_twice
                    q5: sometimes
              security_pro:
                summary: Excellent security practices
                value:
                  answers:
                    q1: never
                    q2: all
                    q3: always
                    q4: never
                    q5: never

      responses:
        "200":
          description: Horoscope successfully generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoroscopeResponse"
              examples:
                bad_score_example:
                  summary: High-risk user (Data Breach Influencer)
                  value:
                    final_score: 88
                    cyber_sign: "Data Breach Influencer"
                    cyber_sign_emoji: "📢"
                    cyber_sign_description: "You are basically unpaid marketing for the dark web."
                    dimensions:
                      phishing_risk_pct: 90
                      password_aura: "Catastrophic"
                      wifi_karma: "Suicidal"
                      scam_magnet_level: "Irresistible"
                      data_leak_risk: "Certain"
                    prophecies:
                      phishing: "A Nigerian prince has marked you as 'easy target of the month'. Congratulations."
                      password: "Your password was last seen in 47 data breaches. It is tired. Retire it."
                      wifi: "A rogue access point disguised as your local café network awaits. Bring a VPN."
                      data_leak: "haveibeenpwned.com has a fan page dedicated to your credentials."
                      daily: "Mercury is in malware retrograde. Update your antivirus before leaving the house."
                    lucky_security_charm: "Install a reputable password manager (Bitwarden is free and open-source)."
                    lucky_security_number: 1337
                    roast_message: "The cybersecurity gods have reviewed your digital habits and are deeply concerned. A formal warning has been issued."
                    generated_at: "2025-07-15T10:30:00Z"

        "400":
          description: Invalid request — missing or unrecognised answer values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "INVALID_ANSWERS"
                message: "Invalid value 'maybe' for question q1. Allowed: always, sometimes, never"
                status: 400

        "500":
          description: Unexpected Lambda error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:

    HoroscopeRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: object
          description: Map of question ID to selected option value
          required: [q1, q2, q3, q4, q5]
          properties:
            q1:
              type: string
              enum: [always, sometimes, never]
              description: Password reuse habit
            q2:
              type: string
              enum: [none, some, all]
              description: 2FA usage
            q3:
              type: string
              enum: [never, sometimes, always]
              description: Software update frequency
            q4:
              type: string
              enum: [regularly, once_or_twice, never]
              description: Cracked software downloads
            q5:
              type: string
              enum: [always, sometimes, never]
              description: Clicking shortened links

    HoroscopeResponse:
      type: object
      required:
        - final_score
        - cyber_sign
        - cyber_sign_emoji
        - cyber_sign_description
        - dimensions
        - prophecies
        - lucky_security_charm
        - lucky_security_number
        - generated_at
      properties:
        final_score:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall cyber risk score (higher = riskier)
        cyber_sign:
          type: string
          enum:
            - Firewall Phoenix
            - Encryption Wizard
            - Patch Warrior
            - Phishing Magnet
            - Data Breach Influencer
        cyber_sign_emoji:
          type: string
        cyber_sign_description:
          type: string
        dimensions:
          type: object
          properties:
            phishing_risk_pct:
              type: integer
              minimum: 0
              maximum: 100
            password_aura:
              type: string
              enum: [Legendary, Strong, Moderate, Weak, Catastrophic]
            wifi_karma:
              type: string
              enum: [Pristine, Cautious, Reckless, Suicidal]
            scam_magnet_level:
              type: string
              enum: [Repellent, Neutral, Attractive, Irresistible]
            data_leak_risk:
              type: string
              enum: [Minimal, Low, Moderate, High, Certain]
        prophecies:
          type: object
          properties:
            phishing:  { type: string }
            password:  { type: string }
            wifi:      { type: string }
            data_leak: { type: string }
            daily:     { type: string }
        lucky_security_charm:
          type: string
          description: Actionable security tip disguised as a lucky charm
        lucky_security_number:
          type: integer
          description: A well-known port/number from security lore
        roast_message:
          type: string
          nullable: true
          description: Present only when final_score >= 70
        generated_at:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "healthy"
        message:
          type: string
          example: "The cyber spirits are with us."

    ErrorResponse:
      type: object
      required: [error, message, status]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error description
        status:
          type: integer
